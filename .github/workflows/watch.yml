name: Crous Bourges Watcher

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer le watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crous_watcher.py

      - name: Sauvegarder les logements deja vus
        run: |
          git config user.name "crous-watcher-bot"
          git config user.email "actions@github.com"
          git add state/seen.json
          git diff --staged --quiet || git commit -m "update seen listings [skip ci]"
          git push
